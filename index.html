<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Bomberman</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>
  </div>

  <!-- Connection UI Overlay -->
  <div id="connection-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:9999;justify-content:center;align-items:center;flex-direction:column;">
    <div id="connection-panel" style="background:#1a1a2e;padding:30px;border-radius:12px;max-width:500px;width:90%;color:#fff;text-align:center;">
      <h2 id="connection-title" style="margin-bottom:20px;">Online Multiplayer</h2>
      <div id="connection-buttons">
        <button id="btn-host" style="padding:12px 24px;margin:8px;font-size:16px;background:#2ecc71;color:#fff;border:none;border-radius:6px;cursor:pointer;">Host Game</button>
        <button id="btn-join" style="padding:12px 24px;margin:8px;font-size:16px;background:#3498db;color:#fff;border:none;border-radius:6px;cursor:pointer;">Join Game</button>
        <button id="btn-close-connection" style="padding:12px 24px;margin:8px;font-size:16px;background:#e74c3c;color:#fff;border:none;border-radius:6px;cursor:pointer;">Cancel</button>
      </div>

      <!-- Room code display (host) -->
      <div id="room-code-display" style="display:none;margin:20px 0;"></div>

      <!-- Room code input (join) -->
      <div id="room-code-input-wrapper" style="display:none;margin:20px 0;">
        <input id="room-code-input" type="text" maxlength="6" placeholder="Enter 6-char code"
          style="font-size:28px;letter-spacing:6px;text-align:center;padding:12px;font-family:monospace;background:#0d0d1a;color:#fff;border:2px solid #3498db;border-radius:6px;width:200px;text-transform:uppercase;" />
        <br>
        <button id="btn-join-room" style="padding:10px 20px;margin-top:12px;font-size:16px;background:#3498db;color:#fff;border:none;border-radius:6px;cursor:pointer;">Connect</button>
      </div>

      <div id="connection-status" style="margin-top:15px;font-size:14px;color:#aaa;"></div>
    </div>
  </div>

  <!-- PeerJS for P2P signaling -->
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/map.js"></script>
  <script src="js/player.js"></script>
  <script src="js/bombs.js"></script>
  <script src="js/enemy.js"></script>
  <script src="js/powerup.js"></script>
  <script src="js/powerup-system.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/input.js"></script>
  <script src="js/player-input.js"></script>
  <script src="js/input-manager.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/level.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/explosion-system.js"></script>
  <script src="js/game-state.js"></script>
  <script src="js/touch-controls.js"></script>
  <script src="js/network.js"></script>
  <script src="js/connection-ui.js"></script>
  <script src="js/game.js"></script>
  <script src="js/online-integration.js"></script>
</body>
</html>
